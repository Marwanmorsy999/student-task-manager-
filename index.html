<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ── PERSON 5: Edit all styles in this section ── */
    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --accent: #7c6ef7;
      --accent2: #e06bac;
      --text: #f0eeff;
      --text-muted: #7f7d9a;
      --border: #2e2e3e;
      --danger: #e05c7a;
      --radius: 12px;
      --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    /* ── PERSON 1: Edit the navbar below ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .nav-logo {
      font-family: var(--font-heading);
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 15px;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--text); }

    /* ── PERSON 1: Edit the homepage hero below ── */
    .hero {
      text-align: center;
      padding: 60px 20px 40px;
    }

    .hero h1 {
      font-family: var(--font-heading);
      font-size: 48px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .hero h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 17px;
      max-width: 420px;
      margin: 0 auto;
    }

    /* ── PERSON 2: Edit the add-task form below ── */
    .form-section {
      max-width: 600px;
      margin: 36px auto 0;
      padding: 0 20px;
    }

    .form-section h2 {
      font-family: var(--font-heading);
      font-size: 18px;
      margin-bottom: 14px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .task-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .task-form input,
    .task-form select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .task-form input:focus,
    .task-form select:focus {
      border-color: var(--accent);
    }

    .task-form input::placeholder { color: var(--text-muted); }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row input,
    .form-row select { flex: 1; }

    .btn-add {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-family: var(--font-heading);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-add:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }

    /* ── PERSON 3: Edit the task list below ── */
    .list-section {
      max-width: 600px;
      margin: 32px auto 60px;
      padding: 0 20px;
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .list-header h2 {
      font-family: var(--font-heading);
      font-size: 18px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .task-count {
      background: var(--surface2);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    #task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 15px;
      padding: 40px 0;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    /* ── PERSON 3 + PERSON 4: Task card + delete button ── */
    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: fadeIn 0.25s ease;
      transition: border-color 0.2s;
    }

    .task-card:hover { border-color: var(--accent); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-checkbox {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-info { flex: 1; }

    .task-title {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .task-card.done .task-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-meta {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .task-due {
      font-size: 12px;
      color: var(--text-muted);
    }

    .task-priority {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .priority-high   { background: #3a1a22; color: #e05c7a; }
    .priority-medium { background: #2a2a10; color: #d4a84b; }
    .priority-low    { background: #0f2a1a; color: #4caf82; }

    /* ── PERSON 4: Edit the delete button below ── */
    .btn-delete {
      background: none;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .btn-delete:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: #2a1018;
    }
  </style>
</head>
<body>

  <!-- PERSON 1: Navbar -->
  <nav>
    <span class="nav-logo">TaskFlow</span>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">My Tasks</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>

  <!-- PERSON 1: Hero / Homepage -->
  <section class="hero">
    <h1>Manage your <span>student tasks</span><br/>with ease</h1>
    <p>Add your homework, assignments, and deadlines — all in one place.</p>
  </section>

  <!-- PERSON 2: Add Task Form -->
  <section class="form-section">
    <h2>Add a task</h2>
    <div class="task-form">
      <input type="text" id="task-input" placeholder="Task title (e.g. Math homework chapter 3)" />
      <div class="form-row">
        <input type="date" id="due-date" />
        <select id="priority">
          <option value="low">Low priority</option>
          <option value="medium" selected>Medium priority</option>
          <option value="high">High priority</option>
        </select>
      </div>
      <button class="btn-add" onclick="addTask()">+ Add Task</button>
    </div>
  </section>

  <!-- PERSON 3: Task List -->
  <section class="list-section">
    <div class="list-header">
      <h2>Your tasks</h2>
      <span class="task-count" id="task-count">0 tasks</span>
    </div>
    <div id="task-list">
      <div class="empty-state">No tasks yet — add one above!</div>
    </div>
  </section>

  <script>
    // PERSON 4: Edit the delete logic and task logic below

    let tasks = [];

    function addTask() {
      const title = document.getElementById('task-input').value.trim();
      const due   = document.getElementById('due-date').value;
      const priority = document.getElementById('priority').value;

      if (!title) {
        alert('Please enter a task title!');
        return;
      }

      const task = {
        id: Date.now(),
        title,
        due,
        priority,
        done: false
      };

      tasks.push(task);
      document.getElementById('task-input').value = '';
      document.getElementById('due-date').value = '';
      renderTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      renderTasks();
    }

    function toggleDone(id) {
      const task = tasks.find(t => t.id === id);
      if (task) task.done = !task.done;
      renderTasks();
    }

    function renderTasks() {
      const list = document.getElementById('task-list');
      const count = document.getElementById('task-count');

      count.textContent = tasks.length + (tasks.length === 1 ? ' task' : ' tasks');

      if (tasks.length === 0) {
        list.innerHTML = '<div class="empty-state">No tasks yet — add one above!</div>';
        return;
      }

      list.innerHTML = tasks.map(task => `
        <div class="task-card ${task.done ? 'done' : ''}">
          <input class="task-checkbox" type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleDone(${task.id})"/>
          <div class="task-info">
            <div class="task-title">${task.title}</div>
            <div class="task-meta">
              ${task.due ? `<span class="task-due">Due: ${task.due}</span>` : ''}
              <span class="task-priority priority-${task.priority}">${task.priority}</span>
            </div>
          </div>
          <button class="btn-delete" onclick="deleteTask(${task.id})">&#x2715;</button>
        </div>
      `).join('');
    }

    // Allow pressing Enter to add task
    document.getElementById('task-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addTask();
    });
  </script>

</body>
</html>

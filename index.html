<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Student Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500&family=Poppins:wght@600&display=swap" rel="stylesheet">
  <style>
    /* PERSON 5 - edit styles here */
    body { font-family: 'quicksand', 'comfortaa', sans-serif; max-width: 800px; margin: 40px auto; padding:  20px; background: #132410;color: #041106; }
    nav  { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;background:#36662e;padding: 15px 25px;border-radius: 10px;box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    nav a { margin-left: 20px; text-decoration: none; color: #94e685;font-weight: bold; }
    nav a:hover { text-decoration: underline;color:#3d9d2c; }
    h1   { font-family: 'poppins',sans-serif;font-size: 29px; margin-bottom: 25px;color:#699b61 ;text-align: center; }
    /* PERSON 2 - form styles */
    .form { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 24px; }
    input, select { padding: 8px; margin: 6px 4px 6px 0; border: 1px solid #ccc; border-radius: 4px; }
    button.add { background: #5b4ef5; color: #fff; border: none; padding: 9px 20px; border-radius: 4px; cursor: pointer; }
    /* PERSON 3 + 4 - task card + delete */
    .card { background: #fff; padding: 14px 16px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
    .card.done span { text-decoration: line-through; color: #aaa; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
    .high { background:#fde; color:#c00; } .medium { background:#ffd; color:#960; } .low { background:#dfd; color:#060; }
    button.del { margin-left: auto; background: none; border: none; color: #aaa; font-size: 18px; cursor: pointer; }
    button.del:hover { color: red; }
  </style>
</head>
<body>
 
  <!-- PERSON 1 - edit navbar and heading -->
 <nav>
  <strong style="font-size:20px; color:#5b4ef5;">TaskFlow</strong>
  <div>
    <a href="#">Home</a>
    <a href="#">My Tasks</a>
    <a href="#">About</a>
  </div>
</nav>

<h1>Student Task Manager</h1>
<p style="color:#555;">Stay organized and manage your daily tasks بسهولة.</p>

<div style="background:#fff; padding:15px; border-radius:8px; margin-bottom:20px;">
  <h3>Welcome 👋</h3>
  <p style="color:#666;">Add your tasks, set priorities, and track your progress easily.</p>
</div>
 
  <!-- PERSON 2 - edit the form -->
  <div class="form">
    <input id="title" placeholder="Task title" style="width:100%"/>
    <br/>
    <input type="date" id="due"/>
    <select id="priority">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>
    <button class="add" onclick="addTask()">+ Add Task</button>
  </div>
 
  <!-- PERSON 3 - edit the task list -->
  <div id="list"><p style="color:#aaa">No tasks yet.</p></div>
 
  <script>
    // PERSON 4 - edit the logic below
    let tasks = [];
 
    function addTask() {
      const title = document.getElementById('title').value.trim();
      const due = document.getElementById('due').value;
      const priority = document.getElementById('priority').value;

      if (!title) {
        alert("Task title is required!");
        return;
       }

      if (!due) {
       alert("Please select a due date!");
       return;
      }

      const today = new Date().toISOString().split('T')[0];
      if (due < today) {
         alert("Due date cannot be in the past!");
         return;
       }

      tasks.push({
        id: Date.now(),
        title,
        due,
        priority,
        done: false
   });

  document.getElementById('title').value = '';
  document.getElementById('due').value = '';
  render();
}
 
    function render() {
      document.getElementById('list').innerHTML = tasks.length === 0
        ? '<p style="color:#aaa">No tasks yet.</p>'
        : tasks.map(t => `
          <div class="card ${t.done ? 'done' : ''}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})"/>
            <span>${t.title} ${t.due ? '— ' + t.due : ''}</span>
            <span class="badge ${t.priority}">${t.priority}</span>
            <button class="del" onclick="del(${t.id})">✕</button>
          </div>`).join('');
    }
 
    function toggle(id) { const t = tasks.find(t => t.id===id); t.done=!t.done; render(); }
    function del(id)    { tasks = tasks.filter(t => t.id!==id); render(); }
 
    document.getElementById('title').addEventListener('keydown', e => e.key==='Enter' && addTask());
  </script>
 
</body>
</html>
